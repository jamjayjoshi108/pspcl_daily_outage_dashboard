name: Daily PSPCL Data Scrape

# This triggers the workflow automatically every day and allows you to click a button to run it manually
on:
  schedule:
    # This runs at 2:30 AM UTC, which is 8:00 AM IST. Adjust the hour if needed.
    - cron: '30 2 * * *' 
  workflow_dispatch: 

# Grants permission to push the new CSV files back into your repository
permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push New CSVs
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add *_Outages_*.csv
          # The "|| exit 0" prevents the workflow from failing if data hasn't changed
          git commit -m "Automated daily data update" || exit 0
          git push
